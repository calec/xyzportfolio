<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viewer — cale.xyz/presentations</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Shell chrome ── */
    :root {
      --chrome-bg: #0d0d0d;
      --chrome-border: rgba(51,255,51,0.25);
      --green: #33ff33;
      --mono: 'JetBrains Mono', monospace;
      --pixel: 'Press Start 2P', monospace;
      --bar-h: 44px;
    }

    html, body {
      height: 100%;
      background: var(--chrome-bg);
      font-family: var(--mono);
      overflow: hidden;
    }

    /* ── Top bar ── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--bar-h);
      background: #111;
      border-bottom: 1px solid var(--chrome-border);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      z-index: 100;
      font-size: 12px;
      color: var(--green);
    }

    #topbar a {
      color: rgba(51,255,51,0.45);
      text-decoration: none;
      font-size: 11px;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    #topbar a:hover { color: var(--green); }

    #slide-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: var(--pixel);
      font-size: 8px;
      color: rgba(51,255,51,0.7);
      text-shadow: 0 0 6px rgba(51,255,51,0.3);
    }

    #slide-counter {
      flex-shrink: 0;
      font-size: 11px;
      color: rgba(51,255,51,0.5);
    }

    /* fullscreen button */
    #btn-fs {
      background: transparent;
      border: 1px solid rgba(51,255,51,0.3);
      color: rgba(51,255,51,0.5);
      font-family: var(--mono);
      font-size: 14px;
      width: 28px; height: 28px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    #btn-fs:hover { border-color: var(--green); color: var(--green); }

    /* ── Stage ── */
    #stage {
      position: fixed;
      top: var(--bar-h);
      bottom: var(--bar-h);
      left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
    }

    /* Scale wrapper */
    #scaler {
      transform-origin: center center;
      /* width/height set by JS */
    }

    /* ── MARP slide canvas ── */
    .marp-slide {
      width: 1280px;
      height: 720px;
      position: relative;
      overflow: hidden;
      /* default MARP theme colours */
      background: #fff;
      color: #333;
      font-family: Lato, 'Avenir Next', Avenir, 'Trebuchet MS', 'Segoe UI', sans-serif;
      font-size: 35px;
      line-height: 1.35;
      padding: 70px 80px;
    }

    /* ── MARP default theme ── */
    .marp-slide h1 {
      font-size: 1.3em;
      font-weight: 700;
      margin-bottom: 0.3em;
      line-height: 1.2;
    }
    .marp-slide h2 {
      font-size: 1.1em;
      font-weight: 700;
      margin-bottom: 0.25em;
      line-height: 1.2;
    }
    .marp-slide h3 {
      font-size: 0.85em;
      font-weight: 600;
      margin-bottom: 0.2em;
      color: #555;
    }
    .marp-slide p { font-size: 0.75em; margin-bottom: 0.5em; }
    .marp-slide ul, .marp-slide ol {
      font-size: 0.72em;
      padding-left: 1.2em;
      margin-bottom: 0.5em;
    }
    .marp-slide li { margin-bottom: 0.2em; }
    .marp-slide strong { font-weight: 700; }
    .marp-slide em { font-style: italic; color: #444; }
    .marp-slide a { color: #0645ad; }

    .marp-slide pre {
      background: #f6f8fa;
      border: 1px solid #e1e4e8;
      border-radius: 4px;
      padding: 0.6em 1em;
      overflow: auto;
      font-size: 0.48em;
      line-height: 1.5;
      margin-bottom: 0.5em;
    }
    .marp-slide code {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .marp-slide p code, .marp-slide li code {
      background: #f0f0f0;
      border-radius: 3px;
      padding: 0.1em 0.3em;
      font-size: 0.85em;
    }

    .marp-slide blockquote {
      border-left: 4px solid #0645ad;
      padding: 0.2em 0 0.2em 0.8em;
      color: #555;
      font-size: 0.72em;
      font-style: italic;
      margin-bottom: 0.5em;
    }
    .marp-slide blockquote p { margin: 0; font-size: 1em; }

    .marp-slide table {
      border-collapse: collapse;
      font-size: 0.52em;
      width: 100%;
      margin-bottom: 0.5em;
    }
    .marp-slide th, .marp-slide td {
      border: 1px solid #ccc;
      padding: 0.3em 0.6em;
      text-align: left;
    }
    .marp-slide th {
      background: #f0f0f0;
      font-weight: 700;
    }
    .marp-slide tr:nth-child(even) td { background: #fafafa; }

    .marp-slide hr {
      border: none;
      border-top: 1px solid #ccc;
      margin: 0.5em 0;
    }

    /* Pagination */
    .marp-slide::after {
      content: attr(data-page);
      position: absolute;
      bottom: 20px;
      right: 30px;
      font-size: 0.4em;
      color: #aaa;
    }

    /* Lead / centered layout */
    .marp-slide.lead {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 100px;
    }
    .marp-slide.lead h1 { font-size: 1.6em; }
    .marp-slide.lead h2 { font-size: 1.1em; color: #555; }
    .marp-slide.lead p  { font-size: 0.7em; }

    /* ── Bottom nav bar ── */
    #navbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--bar-h);
      background: #111;
      border-top: 1px solid var(--chrome-border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
    }

    .nav-btn {
      background: transparent;
      border: 1px solid rgba(51,255,51,0.35);
      color: var(--green);
      font-family: var(--mono);
      font-size: 12px;
      padding: 6px 18px;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .nav-btn:hover:not(:disabled) {
      background: rgba(51,255,51,0.1);
      border-color: var(--green);
      box-shadow: 0 0 8px rgba(51,255,51,0.2);
    }
    .nav-btn:disabled {
      color: rgba(51,255,51,0.2);
      border-color: rgba(51,255,51,0.1);
      cursor: not-allowed;
    }

    #dot-track {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 4px;
      background: rgba(51,255,51,0.25);
      cursor: pointer;
      border: none;
      padding: 0;
      transition: all 0.2s;
    }
    .dot.active {
      width: 20px;
      background: var(--green);
    }
    .dot:hover:not(.active) { background: rgba(51,255,51,0.55); }

    /* ── Loading / error ── */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--chrome-bg);
      color: var(--green);
      font-family: var(--mono);
      font-size: 13px;
      gap: 12px;
      z-index: 200;
    }
    #overlay .pixel { font-family: var(--pixel); font-size: 10px; }
    #overlay.hidden { display: none; }
    #overlay.error { color: #ff5555; }
  </style>
</head>
<body>
  <!-- Loading/error overlay -->
  <div id="overlay">
    <div class="pixel">LOADING&hellip;</div>
    <div id="overlay-msg">Fetching presentation</div>
  </div>

  <!-- Top chrome -->
  <div id="topbar">
    <a href="index.html">← Presentations</a>
    <span id="slide-title"></span>
    <span id="slide-counter"></span>
    <button id="btn-fs" title="Toggle fullscreen">⛶</button>
  </div>

  <!-- Slide stage -->
  <div id="stage">
    <div id="scaler">
      <div id="slide-canvas" class="marp-slide"></div>
    </div>
  </div>

  <!-- Bottom nav -->
  <div id="navbar">
    <button class="nav-btn" id="btn-prev" disabled>← Prev</button>
    <div id="dot-track"></div>
    <button class="nav-btn" id="btn-next" disabled>Next →</button>
  </div>

  <!-- Google Fonts for chrome -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet" />

  <script>
    // ── Helpers ──────────────────────────────────────────────────────────────

    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function showError(msg) {
      const ov = document.getElementById('overlay');
      ov.classList.add('error');
      ov.querySelector('.pixel').textContent = 'ERROR';
      document.getElementById('overlay-msg').textContent = msg;
    }

    // Parse YAML-ish front matter (simple key: value, no nesting except |)
    function parseFrontMatter(raw) {
      const meta = {};
      const lines = raw.split('\n');
      let i = 0;
      while (i < lines.length) {
        const line = lines[i];
        const m = line.match(/^(\w+):\s*(.*)/);
        if (!m) { i++; continue; }
        const key = m[1];
        let val = m[2].trim();
        if (val === '|') {
          // block scalar — collect indented lines
          const block = [];
          i++;
          while (i < lines.length && (lines[i].startsWith('  ') || lines[i].trim() === '')) {
            block.push(lines[i].replace(/^  /, ''));
            i++;
          }
          meta[key] = block.join('\n');
          continue;
        }
        // strip surrounding quotes
        if ((val.startsWith('"') && val.endsWith('"')) ||
            (val.startsWith("'") && val.endsWith("'"))) {
          val = val.slice(1, -1);
        }
        meta[key] = val;
        i++;
      }
      return meta;
    }

    // Split raw markdown into [frontMatterString, slide1, slide2, ...]
    function splitMarp(raw) {
      const norm = raw.replace(/\r\n/g, '\n');
      let body = norm;
      let frontMatter = '';

      if (norm.startsWith('---\n')) {
        const end = norm.indexOf('\n---\n', 4);
        if (end !== -1) {
          frontMatter = norm.slice(4, end);
          body = norm.slice(end + 5);
        }
      }

      const slides = body
        .split(/\n---\n/)
        .map(s => s.trim())
        .filter(Boolean);

      return { frontMatter, slides };
    }

    // Extract per-slide MARP directive comments like <!-- _class: lead -->
    function extractDirectives(slideText) {
      const directives = {};
      const cleaned = slideText.replace(/<!--([\s\S]*?)-->/g, (_, inner) => {
        inner.trim().split('\n').forEach(line => {
          const m = line.trim().match(/^_?(\w+):\s*(.+)/);
          if (m) directives[m[1]] = m[2].trim();
        });
        return '';
      });
      return { directives, cleaned: cleaned.trim() };
    }

    // ── Main ─────────────────────────────────────────────────────────────────

    const filename = getParam('file');
    if (!filename) { showError('No file specified. Use ?file=filename.md'); }

    let slides = [];
    let meta   = {};
    let current = 0;

    const canvas  = document.getElementById('slide-canvas');
    const scaler  = document.getElementById('scaler');
    const counter = document.getElementById('slide-counter');
    const title   = document.getElementById('slide-title');
    const dotTrack = document.getElementById('dot-track');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');

    // Scale the 1280×720 canvas to fit the stage area
    function rescale() {
      const stage = document.getElementById('stage');
      const sw = stage.clientWidth  - 32;
      const sh = stage.clientHeight - 32;
      const scale = Math.min(sw / 1280, sh / 720);
      scaler.style.transform = `scale(${scale})`;
      scaler.style.width  = '1280px';
      scaler.style.height = '720px';
    }
    window.addEventListener('resize', rescale);

    function renderSlide(idx) {
      const { directives, cleaned } = extractDirectives(slides[idx]);

      // Class list
      const classes = ['marp-slide'];
      if (directives['class']) {
        directives['class'].split(/\s+/).forEach(c => classes.push(c));
      }

      canvas.className = classes.join(' ');

      // Pagination marker (if enabled)
      const paginate = meta.paginate === 'true';
      canvas.setAttribute('data-page', paginate ? `${idx + 1} / ${slides.length}` : '');

      // Apply per-slide background colour override
      if (directives['backgroundColor']) {
        canvas.style.backgroundColor = directives['backgroundColor'];
      } else {
        canvas.style.backgroundColor = meta.backgroundColor || '#ffffff';
      }
      if (directives['color']) {
        canvas.style.color = directives['color'];
      } else {
        canvas.style.color = '';
      }

      // Render markdown → HTML
      canvas.innerHTML = marked.parse(cleaned);

      // Update chrome
      current = idx;
      counter.textContent = `${idx + 1} / ${slides.length}`;

      // Dots
      document.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === idx);
      });

      btnPrev.disabled = idx === 0;
      btnNext.disabled = idx === slides.length - 1;
    }

    function goTo(idx) {
      idx = Math.max(0, Math.min(slides.length - 1, idx));
      renderSlide(idx);
      // update URL without reload
      const url = new URL(window.location.href);
      url.searchParams.set('slide', idx + 1);
      history.replaceState(null, '', url.toString());
    }

    btnPrev.addEventListener('click', () => goTo(current - 1));
    btnNext.addEventListener('click', () => goTo(current + 1));

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
        e.preventDefault(); goTo(current + 1);
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault(); goTo(current - 1);
      } else if (e.key === 'f' || e.key === 'F') {
        toggleFullscreen();
      } else if (e.key === 'Escape' && document.fullscreenElement) {
        document.exitFullscreen();
      }
    });

    document.getElementById('btn-fs').addEventListener('click', toggleFullscreen);
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen();
      }
    }
    document.addEventListener('fullscreenchange', rescale);

    async function load() {
      if (!filename) return;

      let raw;
      try {
        const res = await fetch(filename);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        raw = await res.text();
      } catch (e) {
        showError(`Could not load "${filename}" — ${e.message}`);
        return;
      }

      const { frontMatter, slides: parsedSlides } = splitMarp(raw);
      meta   = parseFrontMatter(frontMatter);
      slides = parsedSlides;

      if (slides.length === 0) {
        showError('No slides found in this file.');
        return;
      }

      // Inject any custom CSS from front matter `style:` block
      if (meta.style) {
        const styleTag = document.createElement('style');
        // Scope custom styles inside .marp-slide so they don't bleed into chrome
        styleTag.textContent = meta.style
          .split('\n')
          .map(line => {
            const trimmed = line.trim();
            if (trimmed.startsWith('section')) {
              return line.replace(/section/, '.marp-slide');
            }
            return line;
          })
          .join('\n');
        document.head.appendChild(styleTag);
      }

      // Update page title
      const pTitle = meta.title || filename.replace('.md', '');
      document.title = `${pTitle} — cale.xyz/presentations`;
      title.textContent = pTitle;

      // Build dot nav (max 30 visible)
      const showDots = slides.length <= 30;
      if (showDots) {
        slides.forEach((_, i) => {
          const btn = document.createElement('button');
          btn.className = 'dot' + (i === 0 ? ' active' : '');
          btn.title = `Slide ${i + 1}`;
          btn.addEventListener('click', () => goTo(i));
          dotTrack.appendChild(btn);
        });
      }

      btnNext.disabled = false;

      // Honour ?slide=N deep link
      const startSlide = Math.max(0, (parseInt(getParam('slide') || '1', 10) - 1));

      rescale();
      renderSlide(Math.min(startSlide, slides.length - 1));

      // Hide overlay
      document.getElementById('overlay').classList.add('hidden');
    }

    load();
  </script>
</body>
</html>
