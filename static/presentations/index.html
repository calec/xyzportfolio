<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presentations — cale.xyz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #33ff33;
      --amber:  #ffb000;
      --cyan:   #00d4ff;
      --red:    #ff3333;
      --bg:     #0a0a0a;
      --surface:#111111;
      --border: rgba(51,255,51,0.25);
      --mono:   'JetBrains Mono', 'IBM Plex Mono', monospace;
      --pixel:  'Press Start 2P', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      background-image:
        linear-gradient(rgba(17,17,17,0.8) 1px, transparent 1px),
        linear-gradient(90deg, rgba(17,17,17,0.8) 1px, transparent 1px);
      background-size: 40px 40px;
      color: var(--green);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.7;
    }

    /* scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    .shell {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Header ── */
    header {
      mb: 40px;
      margin-bottom: 40px;
    }

    .breadcrumb {
      font-size: 11px;
      color: rgba(51,255,51,0.4);
      margin-bottom: 24px;
    }

    .breadcrumb a {
      color: rgba(51,255,51,0.4);
      text-decoration: none;
    }

    .breadcrumb a:hover { color: var(--green); }

    h1 {
      font-family: var(--pixel);
      font-size: clamp(10px, 2vw, 14px);
      color: var(--green);
      text-shadow: 0 0 12px rgba(51,255,51,0.5);
      letter-spacing: 0.05em;
      line-height: 1.8;
      margin-bottom: 8px;
    }

    .subtitle {
      color: rgba(51,255,51,0.5);
      font-size: 12px;
      margin-bottom: 32px;
    }

    /* ── Column headers ── */
    .col-headers {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 16px;
      padding: 0 12px 8px;
      border-bottom: 1px solid rgba(51,255,51,0.12);
      color: rgba(51,255,51,0.35);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Presentation row ── */
    .pres-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }

    .pres-row {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 14px;
      align-items: center;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--green);
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }

    .pres-row:hover {
      background: rgba(51,255,51,0.05);
      border-color: rgba(51,255,51,0.5);
      box-shadow: 0 0 12px rgba(51,255,51,0.1);
    }

    .pres-icon { font-size: 22px; flex-shrink: 0; }

    .pres-meta { overflow: hidden; }

    .pres-title {
      font-family: var(--pixel);
      font-size: 9px;
      color: var(--green);
      text-shadow: 0 0 6px rgba(51,255,51,0.4);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .pres-desc {
      font-size: 11px;
      color: rgba(51,255,51,0.45);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pres-date {
      font-size: 11px;
      color: rgba(51,255,51,0.35);
      flex-shrink: 0;
      white-space: nowrap;
    }

    .pres-slides {
      font-size: 11px;
      color: rgba(51,255,51,0.35);
      flex-shrink: 0;
      white-space: nowrap;
      text-align: right;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid rgba(51,255,51,0.1);
      color: rgba(51,255,51,0.3);
      font-size: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* ── Loading / error states ── */
    .state-msg {
      padding: 40px;
      text-align: center;
      color: rgba(51,255,51,0.4);
      font-size: 12px;
    }

    .state-msg.error { color: var(--red); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .col-headers { display: none; }
      .pres-row { grid-template-columns: auto 1fr; }
      .pres-date, .pres-slides { display: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="breadcrumb">
        <a href="https://cale.xyz">cale.xyz</a>
        &nbsp;/&nbsp; presentations
      </div>
      <h1>📊 Presentations</h1>
      <p class="subtitle">Click any entry to open the slide deck in your browser.</p>
    </header>

    <div class="col-headers">
      <span style="grid-column:1/3">Name</span>
      <span>Date</span>
      <span style="text-align:right">Slides</span>
    </div>

    <div class="pres-list" id="list">
      <div class="state-msg" id="loading">Loading presentations&hellip;</div>
    </div>

    <div class="footer">
      <span id="count"></span>
      <span>MARP presentations &mdash; cale.xyz</span>
    </div>
  </div>

  <script>
    async function init() {
      const list = document.getElementById('list');
      const countEl = document.getElementById('count');

      let presentations;
      try {
        const res = await fetch('manifest.json');
        if (!res.ok) throw new Error('manifest fetch failed');
        presentations = await res.json();
      } catch (e) {
        list.innerHTML = '<div class="state-msg error">⚠ Could not load manifest.json</div>';
        return;
      }

      list.innerHTML = '';

      presentations.forEach(p => {
        const a = document.createElement('a');
        a.className = 'pres-row';
        a.href = `viewer.html?file=${encodeURIComponent(p.filename)}`;
        a.innerHTML = `
          <span class="pres-icon">📊</span>
          <div class="pres-meta">
            <div class="pres-title">${escHtml(p.title)}</div>
            <div class="pres-desc">${escHtml(p.description)}</div>
          </div>
          <span class="pres-date">${escHtml(p.date)}</span>
          <span class="pres-slides">${p.slides != null ? p.slides + ' slides' : '.md'}</span>
        `;
        list.appendChild(a);
      });

      countEl.textContent = `${presentations.length} presentation${presentations.length !== 1 ? 's' : ''}`;
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    init();
  </script>
</body>
</html>
